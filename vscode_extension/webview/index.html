<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none';
      style-src {{cspSource}} 'nonce-{{nonce}}';
      script-src 'nonce-{{nonce}}';">
  <title>Net Inspector</title>
  <style nonce="{{nonce}}">
    :root {
      --bg: var(--vscode-editor-background);
      --bg-secondary: var(--vscode-sideBar-background, #1e1e1e);
      --fg: var(--vscode-editor-foreground);
      --fg-muted: var(--vscode-descriptionForeground);
      --border: var(--vscode-panel-border);
      --accent: var(--vscode-button-background);
      --accent-fg: var(--vscode-button-foreground);
      --accent-hover: var(--vscode-button-hoverBackground);
      --input-bg: var(--vscode-input-background);
      --input-border: var(--vscode-input-border);
      --input-fg: var(--vscode-input-foreground, var(--fg));
      --badge-bg: var(--vscode-badge-background);
      --badge-fg: var(--vscode-badge-foreground);
      --list-hover: var(--vscode-list-hoverBackground);
      --list-active: var(--vscode-list-activeSelectionBackground);
      --list-active-fg: var(--vscode-list-activeSelectionForeground, var(--fg));
      --tab-active-border: var(--vscode-tab-activeBorderTop, var(--accent));
      --scrollbar: var(--vscode-scrollbarSlider-background);
      --success: #4ec9b0;
      --info: #569cd6;
      --warn: #cca700;
      --error: #f14c4c;
      --mocked: #b07dd6;
      --json-key: #9cdcfe;
      --json-string: #ce9178;
      --json-number: #b5cea8;
      --json-bool: #569cd6;
      --json-null: #808080;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, sans-serif);
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
    }

    /* ---- Layout ---- */
    .app {
      display: grid;
      grid-template-rows: 40px 32px 1fr;
      grid-template-columns: 1fr;
      height: 100vh;
    }
    .app.detail-open {
      grid-template-columns: 1fr 420px;
    }
    .app.detail-open .toolbar { grid-column: 1 / -1; }
    .app.detail-open .tab-bar { grid-column: 1 / 2; }
    .app.detail-open .request-list { grid-column: 1 / 2; }
    .app.detail-open .detail-panel { grid-column: 2 / 3; grid-row: 2 / 4; }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      grid-column: 1 / -1;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--fg-muted);
      min-width: 100px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--fg-muted);
      flex-shrink: 0;
    }
    .status-dot.on { background: var(--success); }
    .status-dot.waiting { background: var(--warn); }

    .search-box {
      flex: 1;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 3px 8px 3px 26px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--input-fg);
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: "⌕";
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 2px;
    }

    .btn {
      padding: 3px 10px;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { background: var(--list-hover); }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-hover); opacity: 0.9; }
    .btn-danger { color: var(--error); border-color: var(--error); }
    .btn-danger:hover { background: rgba(241, 76, 76, 0.1); }
    .btn-sm { padding: 2px 6px; font-size: 10px; }

    /* ---- Tab bar ---- */
    .tab-bar {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      font-size: 11px;
      overflow-x: auto;
    }
    .tab {
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
      white-space: nowrap;
      user-select: none;
    }
    .tab:hover { color: var(--fg); background: var(--list-hover); }
    .tab.active {
      color: var(--fg);
      border-bottom-color: var(--tab-active-border);
    }
    .tab .count {
      font-size: 10px;
      background: var(--badge-bg);
      color: var(--badge-fg);
      padding: 0 5px;
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
    }

    /* ---- Request list ---- */
    .request-list {
      overflow-y: auto;
      overflow-x: hidden;
    }
    .request-list::-webkit-scrollbar { width: 8px; }
    .request-list::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    .list-header {
      display: grid;
      grid-template-columns: 50px 56px var(--url-col-w, 1fr) 64px 56px 28px;
      padding: 4px 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .url-header-cell {
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .col-resize-handle {
      position: absolute;
      right: -4px;
      top: 0;
      width: 8px;
      height: 100%;
      cursor: col-resize;
      z-index: 3;
    }
    .col-resize-handle::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      width: 2px;
      height: 60%;
      background: var(--border);
      border-radius: 1px;
      transform: translateX(-50%);
    }
    .col-resize-handle:hover::after { background: var(--accent); }

    .time-header {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .time-header:hover { color: var(--fg); }
    .sort-arrow { opacity: 0.7; font-size: 9px; }

    .req-row {
      display: grid;
      grid-template-columns: 50px 56px var(--url-col-w, 1fr) 64px 56px 28px;
      padding: 5px 10px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      cursor: pointer;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .req-row:hover { background: var(--list-hover); }
    .req-row.selected {
      background: var(--list-active);
      color: var(--list-active-fg);
    }
    .req-row.has-error { border-left: 3px solid var(--error); padding-left: 7px; }
    .req-row.is-mocked { border-left: 3px solid var(--mocked); padding-left: 7px; }
    .req-row.is-breakpoint {
      border-left: 3px solid var(--warn);
      padding-left: 7px;
      animation: bp-pulse 2s ease-in-out infinite;
    }
    @keyframes bp-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    .row-menu-btn {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 15px;
      padding: 0 4px;
      border-radius: 3px;
      opacity: 0;
      line-height: 1;
      align-self: center;
      justify-self: center;
      transition: opacity 0.1s;
    }
    .req-row:hover .row-menu-btn,
    .req-row.selected .row-menu-btn { opacity: 1; }
    .row-menu-btn:hover { color: var(--fg); background: rgba(128,128,128,0.15); }

    .row-context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      z-index: 1000;
      min-width: 140px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      overflow: hidden;
      display: none;
    }
    .row-context-menu.open { display: block; }
    .row-context-menu button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: var(--fg);
      padding: 8px 12px;
      text-align: left;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .row-context-menu button:hover { background: var(--list-hover); }

    .method {
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.3px;
    }
    .method.GET  { color: var(--success); }
    .method.POST { color: var(--info); }
    .method.PUT  { color: var(--warn); }
    .method.DELETE { color: var(--error); }
    .method.PATCH { color: #d19a66; }

    .status-code { font-weight: 600; font-size: 11px; }
    .status-code.s2 { color: var(--success); }
    .status-code.s3 { color: var(--warn); }
    .status-code.s4 { color: var(--error); }
    .status-code.s5 { color: var(--error); }
    .status-code.pending { color: var(--fg-muted); }

    .url-cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .url-path { opacity: 0.9; }

    .pill {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .pill-mock { background: var(--mocked); color: #fff; }
    .pill-bp { background: var(--warn); color: #000; }

    .duration { color: var(--fg-muted); font-size: 11px; text-align: right; }
    .time { color: var(--fg-muted); font-size: 10px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--fg-muted);
      gap: 8px;
      padding: 40px;
      text-align: center;
    }
    .empty-state .icon { font-size: 32px; opacity: 0.4; }
    .empty-state p { max-width: 300px; line-height: 1.5; }

    /* ---- Detail panel ---- */
    .detail-panel {
      display: none;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg);
      overflow: hidden;
    }
    .detail-panel.open { display: flex; }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      gap: 8px;
      min-height: 36px;
    }
    .detail-header-title {
      font-weight: 600;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .detail-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .detail-tab {
      padding: 5px 14px;
      cursor: pointer;
      font-size: 11px;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
    }
    .detail-tab:hover { color: var(--fg); }
    .detail-tab.active {
      color: var(--fg);
      border-bottom-color: var(--tab-active-border);
      font-weight: 500;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .detail-body::-webkit-scrollbar { width: 8px; }
    .detail-body::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    .detail-section {
      margin-bottom: 16px;
    }
    .detail-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* JSON viewer */
    .json-view {
      font-family: var(--vscode-editor-font-family, 'Cascadia Code', 'Fira Code', monospace);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      tab-size: 2;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      overflow-x: auto;
    }
    .jk { color: var(--json-key); }
    .js { color: var(--json-string); }
    .jn { color: var(--json-number); }
    .jb { color: var(--json-bool); }
    .jnull { color: var(--json-null); }
    .jp { color: var(--fg-muted); }

    /* Header table */
    .header-table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }
    .header-table td {
      padding: 3px 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      vertical-align: top;
    }
    .header-table td:first-child {
      font-weight: 500;
      white-space: nowrap;
      width: 140px;
      color: var(--json-key);
    }
    .header-table td:last-child {
      word-break: break-all;
    }

    /* ---- Mock rules panel ---- */
    .mock-panel {
      overflow-y: auto;
      padding: 12px;
    }
    .mock-rule-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      background: var(--bg-secondary);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .mock-rule-card .rule-info { flex: 1; }
    .mock-rule-card .rule-pattern {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 12px;
      color: var(--json-string);
      word-break: break-all;
    }
    .mock-rule-card .rule-meta {
      font-size: 10px;
      color: var(--fg-muted);
      margin-top: 4px;
      display: flex;
      gap: 8px;
    }

    /* ---- Mock editor overlay ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 560px;
      min-width: 400px;
      min-height: 300px;
      max-width: 95vw;
      max-height: 95vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      resize: both;
      overflow: hidden; /* required for resize */
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h3 { font-size: 14px; font-weight: 500; }
    .modal-body { 
      padding: 16px; 
      flex: 1;
      overflow-y: auto;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .form-row {
      margin-bottom: 10px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      color: var(--fg-muted);
      margin-bottom: 3px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 5px 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--input-fg);
      font-family: inherit;
      font-size: 12px;
      border-radius: 4px;
      outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }
    .form-textarea {
      font-family: var(--vscode-editor-font-family, monospace);
      min-height: 140px;
      resize: vertical;
      line-height: 1.5;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
      z-index: 1;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track {
      background: var(--success);
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(14px);
    }

    /* Mock status bar in detail panel */
    .mock-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: color-mix(in srgb, var(--mocked) 12%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--mocked) 25%, transparent);
      font-size: 11px;
    }
    .mock-status-bar.inactive {
      background: color-mix(in srgb, var(--border) 20%, transparent);
      border-bottom-color: var(--border);
    }
    .mock-status-label {
      flex: 1;
      color: var(--fg-muted);
    }
    .mock-status-label strong {
      color: var(--mocked);
    }
    .mock-status-bar.inactive .mock-status-label strong {
      color: var(--fg-muted);
    }

    /* JSON Editor syntax highlight overlay */
    .json-editor-wrapper {
      position: relative;
    }
    .json-editor-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      padding: 5px 8px; /* sync with .form-textarea */
      margin: 0;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      tab-size: 2;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      color: var(--fg);
      overflow-y: auto;
      overflow-x: hidden;
      pointer-events: none;
    }
    .json-editor-backdrop::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    .json-editor-textarea {
      position: relative;
      z-index: 2;
      background: transparent !important;
      color: transparent !important;
      caret-color: var(--input-fg);
    }
    .json-editor-textarea.json-invalid {
      border-color: var(--error) !important;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Server stopped</span>
      </div>

      <div class="toolbar-sep"></div>

      <div class="search-box">
        <input type="text" id="filterInput" placeholder="Filter by URL, method, or status code...">
      </div>

      <div class="toolbar-sep"></div>

      <button class="btn btn-sm btn-primary" data-action="mock" title="Add new mock rule">
        + Mock
      </button>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar" id="tabBar">
      <div class="tab active" data-tab="all">
        All <span class="count" id="countAll">0</span>
      </div>
      <div class="tab" data-tab="xhr">
        XHR
      </div>
      <div class="tab" data-tab="mocked">
        Mocked <span class="count" id="countMocked">0</span>
      </div>
      <div class="tab" data-tab="errors">
        Errors <span class="count" id="countErrors">0</span>
      </div>
      <div class="tab" data-tab="rules">
        Mock Rules <span class="count" id="countRules">0</span>
      </div>
      <button class="btn btn-sm btn-danger" data-action="clear" title="Clear all captured traffic"
        style="margin-left:auto;align-self:center;margin-right:8px">
        ⊘ Clear traffic
      </button>
    </div>

    <!-- Request list -->
    <div class="request-list" id="requestList">
      <div class="empty-state">
        <div class="icon">◎</div>
        <p>No network requests captured yet.<br>Start your Flutter app with the interceptor connected.</p>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header" id="detailHeader">
        <span class="detail-header-title" id="detailTitle">—</span>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn btn-sm" id="btnMockThis" data-action="mock-this"
            style="border-color:var(--mocked);color:var(--mocked)">
            ✦ Mock this
          </button>
          <button class="btn btn-sm" id="btnReplay" data-action="replay">
            ↻ Replay
          </button>
          <button class="btn btn-sm" id="btnResume" data-action="resume"
            style="display:none;border-color:var(--warn);color:var(--warn)">
            ▶ Resume
          </button>
          <button class="btn btn-sm" data-action="close-detail" style="opacity:0.6">✕</button>
        </div>
      </div>
      <div id="mockStatusBar"></div>
      <div class="detail-tabs" id="detailTabs">
        <div class="detail-tab active" data-dtab="overview">Overview</div>
        <div class="detail-tab" data-dtab="request">Request</div>
        <div class="detail-tab" data-dtab="response">Response</div>
        <div class="detail-tab" data-dtab="headers">Headers</div>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <!-- Row context menu -->
  <div id="rowContextMenu" class="row-context-menu">
    <button data-ctx="mock-this">✦ Mock this</button>
    <button data-ctx="replay">↻ Replay</button>
  </div>

  <!-- Mock editor overlay -->
  <div class="overlay" id="mockOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="mockEditorTitle">Add mock rule</h3>
        <button class="btn btn-sm" data-action="close-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">URL (exact match)</label>
          <input class="form-input" type="text" id="fUrlPattern"
            placeholder="https://api.example.com/v1/users?page=1">
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label class="form-label">Method</label>
            <select class="form-select" id="fMethod">
              <option value="">Any method</option>
              <option value="GET">GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">Action</label>
            <select class="form-select" id="fAction">
              <option value="mockBeforeRequest">Mock (skip server)</option>
              <option value="breakpoint">Breakpoint (pause response)</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label class="form-label">Status code</label>
            <select class="form-select" id="fStatusCode">
              <optgroup label="1xx Informational">
                <option value="100">100 Continue</option>
                <option value="101">101 Switching Protocols</option>
              </optgroup>
              <optgroup label="2xx Success">
                <option value="200" selected>200 OK</option>
                <option value="201">201 Created</option>
                <option value="202">202 Accepted</option>
                <option value="204">204 No Content</option>
              </optgroup>
              <optgroup label="3xx Redirection">
                <option value="301">301 Moved Permanently</option>
                <option value="302">302 Found</option>
                <option value="304">304 Not Modified</option>
              </optgroup>
              <optgroup label="4xx Client Error">
                <option value="400">400 Bad Request</option>
                <option value="401">401 Unauthorized</option>
                <option value="403">403 Forbidden</option>
                <option value="404">404 Not Found</option>
                <option value="405">405 Method Not Allowed</option>
                <option value="409">409 Conflict</option>
                <option value="410">410 Gone</option>
                <option value="422">422 Unprocessable Entity</option>
                <option value="429">429 Too Many Requests</option>
              </optgroup>
              <optgroup label="5xx Server Error">
                <option value="500">500 Internal Server Error</option>
                <option value="502">502 Bad Gateway</option>
                <option value="503">503 Service Unavailable</option>
                <option value="504">504 Gateway Timeout</option>
              </optgroup>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">Delay (ms)</label>
            <input class="form-input" type="number" id="fDelay" value="0" min="0" step="100">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label">Response headers (JSON)</label>
          <input class="form-input" type="text" id="fHeaders"
            value='{"content-type":"application/json"}'>
        </div>
        <div class="form-row">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
            <label class="form-label" style="margin:0">Response body</label>
            <button class="btn btn-sm" type="button" id="btnFormatBody" title="Pretty-print JSON">{ } Format</button>
          </div>
          <div class="json-editor-wrapper">
            <div id="fBodyHighlight" class="json-editor-backdrop"></div>
            <textarea class="form-textarea json-editor-textarea" id="fBody"
              placeholder='{"message": "Hello from mock"}' spellcheck="false"></textarea>
          </div>
          <div id="fBodyError" style="display:none;font-size:11px;color:var(--error);margin-top:3px"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-action="cancel-modal">Cancel</button>
        <button class="btn btn-primary" id="btnSaveMock" data-action="save-mock">Save rule</button>
      </div>
    </div>
  </div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();

    // ---- State ----
    let serverRunning = false;
    let entries = [];
    let mockRules = [];
    let selectedId = null;
    let currentMainTab = 'all';
    let currentDetailTab = 'overview';
    let filterText = '';
    let editingRuleId = null;
    let modifyRequestId = null;
    let sortOrder = 'desc'; // 'desc' = newest first, 'asc' = oldest first
    let isResizing = false;
    let resizeStartX = 0;
    let resizeStartWidth = 0;
    let rowMenuEntryId = null;

    // ---- VSCode messages ----
    window.addEventListener('message', (event) => {
      const { type, payload } = event.data;
      switch (type) {
        case 'initial_data':
          entries = payload.entries || [];
          serverRunning = payload.serverRunning !== false;
          updateStatus(payload.connectedClients > 0);
          render();
          break;
        case 'request_captured':
          addEntry({
            id: payload.id, method: payload.method, url: payload.url,
            requestHeaders: payload.headers || {},
            requestBody: payload.body,
            queryParameters: payload.queryParameters || {},
            requestTimestamp: payload.timestamp,
          });
          break;
        case 'response_captured': {
          const e = entries.find(x => x.id === payload.requestId);
          if (e) {
            e.statusCode = payload.statusCode;
            e.responseHeaders = payload.headers;
            e.responseBody = payload.body;
            e.durationMs = payload.durationMs;
            e.mocked = payload.mocked || false;
            e.breakpoint = payload.breakpoint || false;
            render();
            if (selectedId === e.id) renderDetail(e);
          }
          break;
        }
        case 'error_captured': {
          const e2 = entries.find(x => x.id === payload.requestId);
          if (e2) {
            e2.statusCode = payload.statusCode;
            e2.durationMs = payload.durationMs;
            e2.error = { type: payload.type, message: payload.message };
            render();
          }
          break;
        }
        case 'load_persisted_rules':
          mockRules = payload.rules || [];
          render();
          break;
        case 'app_connected': updateStatus(true); break;
        case 'app_disconnected': updateStatus(false); break;
        case 'server_status':
          serverRunning = payload.serverRunning;
          updateStatus(payload.serverRunning && payload.connectedClients > 0);
          if (!payload.serverRunning && mockRules.some(r => r.enabled !== false)) {
            mockRules = mockRules.map(r => ({ ...r, enabled: false }));
            vscode.postMessage({ command: 'persistRules', data: { rules: mockRules } });
            render();
          }
          break;
      }
    });

    function addEntry(entry) {
      entries.push(entry);
      if (entries.length > 1000) entries.splice(0, entries.length - 500);
      render();
    }

    // ---- Rendering ----
    function render() {
      updateCounts();
      if (currentMainTab === 'rules') {
        renderRules();
      } else {
        renderList();
      }
    }

    function getFiltered() {
      let list = entries;
      const f = filterText.toLowerCase();
      if (currentMainTab === 'mocked') list = list.filter(e => e.mocked);
      else if (currentMainTab === 'errors') list = list.filter(e => e.error || (e.statusCode && e.statusCode >= 400));
      if (f) {
        list = list.filter(e =>
          e.url.toLowerCase().includes(f) ||
          e.method.toLowerCase().includes(f) ||
          String(e.statusCode || '').includes(f)
        );
      }
      return list;
    }

    function renderList() {
      const container = document.getElementById('requestList');
      const filtered = getFiltered().slice().sort((a, b) => {
        const ta = a.requestTimestamp ? new Date(a.requestTimestamp).getTime() : 0;
        const tb = b.requestTimestamp ? new Date(b.requestTimestamp).getTime() : 0;
        return sortOrder === 'desc' ? tb - ta : ta - tb;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">◎</div>'
          + '<p>' + (filterText ? 'No matching requests' : 'No network requests captured yet.') + '</p></div>';
        return;
      }

      const arrow = '<span class="sort-arrow">' + (sortOrder === 'desc' ? ' ▼' : ' ▲') + '</span>';
      let html = '<div class="list-header">'
        + '<span>Method</span><span>Status</span>'
        + '<span class="url-header-cell"><span>URL</span><div class="col-resize-handle" id="colResizeHandle"></div></span>'
        + '<span class="time-header" id="timeHeader">Time' + arrow + '</span>'
        + '<span>Duration</span><span></span></div>';

      for (const e of filtered) {
        const cls = [
          'req-row',
          selectedId === e.id ? 'selected' : '',
          e.error ? 'has-error' : '',
          e.mocked ? 'is-mocked' : '',
          e.breakpoint ? 'is-breakpoint' : '',
        ].filter(Boolean).join(' ');

        const sc = e.statusCode;
        const scClass = sc ? 's' + String(sc)[0] : (e.error ? 's5' : 'pending');
        const path = extractPath(e.url);
        let pills = '';
        if (e.mocked) pills += '<span class="pill pill-mock">MOCK</span>';
        if (e.breakpoint) pills += '<span class="pill pill-bp">PAUSED</span>';

        html += '<div class="' + cls + '" data-id="' + e.id + '">'
          + '<span class="method ' + e.method + '">' + e.method + '</span>'
          + '<span class="status-code ' + scClass + '">' + (sc || (e.error ? 'ERR' : '···')) + '</span>'
          + '<span class="url-cell"><span class="url-path">' + esc(path) + '</span>' + pills + '</span>'
          + '<span class="time">' + fmtTime(e.requestTimestamp) + '</span>'
          + '<span class="duration">' + (e.durationMs != null ? e.durationMs + 'ms' : '') + '</span>'
          + '<button class="row-menu-btn" data-row-menu="' + e.id + '" title="More actions">⋮</button>'
          + '</div>';
      }
      container.innerHTML = html;

      const timeHeader = document.getElementById('timeHeader');
      if (timeHeader) {
        timeHeader.addEventListener('click', () => {
          sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
          renderList();
        });
      }

      const resizeHandle = document.getElementById('colResizeHandle');
      if (resizeHandle) {
        resizeHandle.addEventListener('mousedown', startColResize);
      }
    }

    function startColResize(e) {
      e.preventDefault();
      isResizing = true;
      resizeStartX = e.clientX;
      const container = document.getElementById('requestList');
      const urlCell = container.querySelector('.url-header-cell');
      resizeStartWidth = urlCell ? urlCell.getBoundingClientRect().width : 200;
      document.addEventListener('mousemove', onColResize);
      document.addEventListener('mouseup', stopColResize);
    }

    function onColResize(e) {
      if (!isResizing) return;
      const delta = e.clientX - resizeStartX;
      const newWidth = Math.max(80, resizeStartWidth + delta);
      document.getElementById('requestList').style.setProperty('--url-col-w', newWidth + 'px');
    }

    function stopColResize() {
      isResizing = false;
      document.removeEventListener('mousemove', onColResize);
      document.removeEventListener('mouseup', stopColResize);
    }

    function renderRules() {
      const container = document.getElementById('requestList');
      if (mockRules.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">⚡</div>'
          + '<p>No mock rules defined yet.<br>Click a request → "✦ Mock this" to create one.</p></div>';
        return;
      }
      let html = '<div class="mock-panel">';
      for (const rule of mockRules) {
        const active = rule.enabled !== false;
        html += '<div class="mock-rule-card" style="' + (active ? '' : 'opacity:0.5') + '">'
          + '<label class="toggle">'
          + '<input type="checkbox" ' + (active ? 'checked' : '') + ' data-toggle-rule="' + rule.id + '">'
          + '<div class="toggle-track"></div>'
          + '<div class="toggle-thumb"></div>'
          + '</label>'
          + '<div class="rule-info">'
          + '<div class="rule-pattern">' + esc(rule.urlPattern) + '</div>'
          + '<div class="rule-meta">'
          + '<span>' + (rule.method || 'ANY') + '</span>'
          + '<span>' + rule.action + '</span>'
          + (rule.mockResponse ? '<span>→ ' + rule.mockResponse.statusCode + '</span>' : '')
          + (rule.mockResponse?.delayMs ? '<span>+' + rule.mockResponse.delayMs + 'ms</span>' : '')
          + '</div></div>'
          + '<button class="btn btn-sm" data-edit-rule="' + rule.id + '">Edit</button>'
          + '<button class="btn btn-sm btn-danger" data-del-rule="' + rule.id + '">✕</button>'
          + '</div>';
      }
      html += '</div>';
      container.innerHTML = html;
    }

    function updateCounts() {
      document.getElementById('countAll').textContent = entries.length;
      document.getElementById('countMocked').textContent = entries.filter(e => e.mocked).length;
      document.getElementById('countErrors').textContent = entries.filter(e => e.error || (e.statusCode && e.statusCode >= 400)).length;
      document.getElementById('countRules').textContent = mockRules.length;
    }

    // ---- Detail panel ----
    function selectEntry(id) {
      selectedId = id;
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      document.getElementById('app').classList.add('detail-open');
      document.getElementById('detailPanel').classList.add('open');
      renderDetail(entry);
      renderList();
    }

    function renderDetail(entry) {
      document.getElementById('detailTitle').textContent =
        entry.method + ' ' + extractPath(entry.url);

      // Breakpoint resume
      const isBreakpoint = entry.breakpoint;
      document.getElementById('btnResume').style.display = isBreakpoint ? '' : 'none';

      // Always show replay and mock-this for completed requests
      const hasResponse = entry.statusCode != null || entry.error;
      document.getElementById('btnReplay').style.display = hasResponse ? '' : 'none';
      document.getElementById('btnMockThis').style.display = hasResponse ? '' : 'none';

      // Mock status bar — show toggle if a rule exists for this endpoint
      renderMockStatusBar(entry);

      renderDetailTab(entry, currentDetailTab);
    }

    function renderMockStatusBar(entry) {
      const bar = document.getElementById('mockStatusBar');
      const rule = findRuleForEntry(entry);

      if (!rule) {
        bar.innerHTML = '';
        return;
      }

      const active = rule.enabled !== false;
      bar.innerHTML = '<div class="mock-status-bar ' + (active ? '' : 'inactive') + '">'
        + '<span class="mock-status-label">'
        + '<strong>' + (active ? 'Mock active' : 'Mock paused') + '</strong>'
        + ' — ' + (rule.action === 'breakpoint' ? 'breakpoint' : rule.mockResponse ? rule.mockResponse.statusCode : '200')
        + (rule.mockResponse && rule.mockResponse.delayMs ? ' +' + rule.mockResponse.delayMs + 'ms' : '')
        + '</span>'
        + '<button class="btn btn-sm" data-action="edit-active-rule" data-rule-id="' + rule.id + '">Edit</button>'
        + '<label class="toggle">'
        + '<input type="checkbox" ' + (active ? 'checked' : '') + ' data-toggle-rule="' + rule.id + '">'
        + '<div class="toggle-track"></div>'
        + '<div class="toggle-thumb"></div>'
        + '</label>'
        + '</div>';
    }

    function findRuleForEntry(entry) {
      const url = entry.url;
      const method = entry.method;
      for (let i = 0; i < mockRules.length; i++) {
        const r = mockRules[i];
        if (r.method && r.method.toUpperCase() !== method.toUpperCase()) continue;
        if (r.urlPattern === url) return r;
      }
      return null;
    }

    function renderDetailTab(entry, tab) {
      const body = document.getElementById('detailBody');
      let html = '';

      switch (tab) {
        case 'overview':
          html += sec('General');
          html += '<table class="header-table">'
            + tr('URL', entry.url)
            + tr('Method', entry.method)
            + tr('Status', entry.statusCode ?? (entry.error ? 'Error' : 'Pending'))
            + tr('Duration', entry.durationMs != null ? entry.durationMs + ' ms' : '—')
            + tr('Time', entry.requestTimestamp || '—')
            + (entry.mocked ? tr('Type', '<span style="color:var(--mocked)">Mocked</span>') : '')
            + (entry.breakpoint ? tr('Type', '<span style="color:var(--warn)">Breakpoint (paused)</span>') : '')
            + '</table>';

          if (entry.error) {
            html += sec('Error');
            html += '<div class="json-view" style="border-color:var(--error)">'
              + syntaxHL(entry.error) + '</div>';
          }

          if (Object.keys(entry.queryParameters || {}).length > 0) {
            html += sec('Query parameters');
            html += '<table class="header-table">';
            for (const [k, v] of Object.entries(entry.queryParameters)) {
              html += tr(k, v);
            }
            html += '</table>';
          }
          break;

        case 'request':
          html += sec('Request body');
          if (entry.requestBody != null) {
            html += '<div class="json-view">' + syntaxHL(entry.requestBody) + '</div>';
          } else {
            html += '<div style="color:var(--fg-muted);padding:8px;">No request body</div>';
          }
          break;

        case 'response':
          html += sec('Response body');
          if (entry.responseBody != null) {
            html += '<div class="json-view">' + syntaxHL(entry.responseBody) + '</div>';
          } else if (entry.error) {
            html += '<div class="json-view" style="border-color:var(--error)">'
              + syntaxHL(entry.error) + '</div>';
          } else {
            html += '<div style="color:var(--fg-muted);padding:8px;">No response yet</div>';
          }
          break;

        case 'headers':
          html += sec('Request headers');
          html += headersTable(entry.requestHeaders);
          if (entry.responseHeaders) {
            html += sec('Response headers');
            html += headersTable(entry.responseHeaders);
          }
          break;
      }
      body.innerHTML = html;
    }

    function switchDetailTab(el, tab) {
      currentDetailTab = tab;
      document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const entry = entries.find(e => e.id === selectedId);
      if (entry) renderDetailTab(entry, tab);
    }

    function closeDetail() {
      selectedId = null;
      document.getElementById('app').classList.remove('detail-open');
      document.getElementById('detailPanel').classList.remove('open');
      renderList();
    }

    // ---- JSON syntax highlighting ----
    function syntaxHL(data) {
      if (data == null) return '<span class="jnull">null</span>';
      let str;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch { return esc(data); }
      }
      try { str = JSON.stringify(data, null, 2); } catch { return esc(String(data)); }

      return str.replace(
        /("(?:[^"\\]|\\.)*")\s*:/g,
        (m, key) => '<span class="jk">' + esc(key) + '</span>:'
      ).replace(
        /:\s*("(?:[^"\\]|\\.)*")/g,
        (m, val) => ': <span class="js">' + esc(val) + '</span>'
      ).replace(
        /:\s*(-?\d+\.?\d*([eE][+-]?\d+)?)/g,
        (m, num) => ': <span class="jn">' + num + '</span>'
      ).replace(
        /:\s*(true|false)/g,
        (m, b) => ': <span class="jb">' + b + '</span>'
      ).replace(
        /:\s*(null)/g,
        ': <span class="jnull">null</span>'
      );
    }

    // Token-based JSON highlighter — handles all value contexts (objects, arrays, top-level)
    function syntaxHLRaw(rawStr) {
      if (!rawStr) return '';
      let out = '';
      let i = 0;
      const n = rawStr.length;

      while (i < n) {
        const ch = rawStr[i];

        if (ch === '"') {
          // Collect full string literal (handling escape sequences)
          let str = '"';
          i++;
          while (i < n) {
            const c = rawStr[i++];
            str += c;
            if (c === '\\') { if (i < n) str += rawStr[i++]; }
            else if (c === '"') break;
          }
          // Look ahead past whitespace: if followed by ':', this is a key
          let j = i;
          while (j < n && (rawStr[j] === ' ' || rawStr[j] === '\t' || rawStr[j] === '\r' || rawStr[j] === '\n')) j++;
          out += rawStr[j] === ':'
            ? '<span class="jk">' + esc(str) + '</span>'
            : '<span class="js">' + esc(str) + '</span>';
        } else if (ch === 't' && rawStr.startsWith('true', i)) {
          out += '<span class="jb">true</span>';
          i += 4;
        } else if (ch === 'f' && rawStr.startsWith('false', i)) {
          out += '<span class="jb">false</span>';
          i += 5;
        } else if (ch === 'n' && rawStr.startsWith('null', i)) {
          out += '<span class="jnull">null</span>';
          i += 4;
        } else if (ch === '-' || (ch >= '0' && ch <= '9')) {
          let num = '';
          while (i < n) {
            const c = rawStr[i];
            if (c === '-' || c === '+' || c === '.' || c === 'e' || c === 'E' || (c >= '0' && c <= '9')) {
              num += c; i++;
            } else break;
          }
          out += '<span class="jn">' + esc(num) + '</span>';
        } else {
          out += esc(ch);
          i++;
        }
      }

      if (out.endsWith('\n')) out += '\u200B';
      return out;
    }

    // Set the status code select to the closest available option.
    // If the code isn't in the list (e.g. from a real server response),
    // pick the nearest available value so the select always shows something valid.
    function setStatusCode(code) {
      const sel = document.getElementById('fStatusCode');
      const target = parseInt(code, 10) || 200;
      // Try exact match first
      for (const opt of sel.options) {
        if (parseInt(opt.value, 10) === target) { sel.value = opt.value; return; }
      }
      // Fall back to the closest value
      let closest = sel.options[0];
      let minDiff = Infinity;
      for (const opt of sel.options) {
        const diff = Math.abs(parseInt(opt.value, 10) - target);
        if (diff < minDiff) { minDiff = diff; closest = opt; }
      }
      sel.value = closest.value;
    }

    function prettyFormatBody() {
      const ta = document.getElementById('fBody');
      const val = (ta.value || '').trim();
      if (!val) return;
      try {
        ta.value = JSON.stringify(JSON.parse(val), null, 2);
        updateMockBodyHighlight();
      } catch(e) {
        // Not valid JSON — leave as-is
      }
    }

    function updateMockBodyHighlight() {
      const ta = document.getElementById('fBody');
      const hl = document.getElementById('fBodyHighlight');
      if (!ta || !hl) return;
      hl.innerHTML = syntaxHLRaw(ta.value || ta.placeholder || '');
    }

    function validateMockBody() {
      const ta = document.getElementById('fBody');
      const errEl = document.getElementById('fBodyError');
      if (!ta || !errEl) return;
      const val = ta.value.trim();
      if (!val) {
        ta.classList.remove('json-invalid');
        errEl.style.display = 'none';
        return;
      }
      try {
        JSON.parse(val);
        ta.classList.remove('json-invalid');
        errEl.style.display = 'none';
      } catch (e) {
        ta.classList.add('json-invalid');
        errEl.textContent = 'Invalid JSON: ' + e.message;
        errEl.style.display = 'block';
      }
    }

    function syncMockBodyScroll() {
      const ta = document.getElementById('fBody');
      const hl = document.getElementById('fBodyHighlight');
      if (!ta || !hl) return;
      hl.scrollTop = ta.scrollTop;
      hl.scrollLeft = ta.scrollLeft;
    }

    // ---- Mock editor ----
    function openMockEditor(prefill) {
      editingRuleId = null;
      modifyRequestId = null;
      document.getElementById('mockEditorTitle').textContent = 'Add mock rule';
      document.getElementById('btnSaveMock').textContent = 'Save rule';
      document.getElementById('fUrlPattern').value = prefill?.url || '';
      document.getElementById('fMethod').value = prefill?.method || '';
      document.getElementById('fAction').value = 'mockBeforeRequest';
      setStatusCode(prefill?.statusCode || 200);
      document.getElementById('fDelay').value = 0;
      document.getElementById('fBody').value = prefill?.body || '';
      document.getElementById('fHeaders').value = '{"content-type":"application/json"}';
      document.getElementById('mockOverlay').classList.add('open');
      updateMockBodyHighlight();
      validateMockBody();
    }

    function openModifyFromDetail() {
      const entry = entries.find(e => e.id === selectedId);
      if (!entry) return;
      modifyRequestId = entry.id;
      editingRuleId = null;
      document.getElementById('mockEditorTitle').textContent = 'Modify response — ' + entry.id;
      document.getElementById('btnSaveMock').textContent = 'Send modified response';
      document.getElementById('fUrlPattern').value = entry.url;
      document.getElementById('fMethod').value = entry.method;
      document.getElementById('fAction').value = 'mockBeforeRequest';
      setStatusCode(entry.statusCode || 200);
      document.getElementById('fDelay').value = 0;
      document.getElementById('fBody').value = tryStringify(entry.responseBody);
      document.getElementById('fHeaders').value = JSON.stringify(entry.responseHeaders || {"content-type":"application/json"});
      document.getElementById('mockOverlay').classList.add('open');
      updateMockBodyHighlight();
      validateMockBody();
    }

    function editMockRule(ruleId) {
      const rule = mockRules.find(r => r.id === ruleId);
      if (!rule) return;
      editingRuleId = ruleId;
      modifyRequestId = null;
      document.getElementById('mockEditorTitle').textContent = 'Edit mock rule';
      document.getElementById('btnSaveMock').textContent = 'Update rule';
      document.getElementById('fUrlPattern').value = rule.urlPattern;
      document.getElementById('fMethod').value = rule.method || '';
      document.getElementById('fAction').value = rule.action;
      setStatusCode(rule.mockResponse?.statusCode || 200);
      document.getElementById('fDelay').value = rule.mockResponse?.delayMs || 0;
      document.getElementById('fBody').value = tryStringify(rule.mockResponse?.body);
      document.getElementById('fHeaders').value = JSON.stringify(rule.mockResponse?.headers || {});
      document.getElementById('mockOverlay').classList.add('open');
      updateMockBodyHighlight();
      validateMockBody();
    }

    function closeMockEditor() {
      document.getElementById('mockOverlay').classList.remove('open');
      editingRuleId = null;
      modifyRequestId = null;
      // clear any lingering validation state
      const ta = document.getElementById('fBody');
      const errEl = document.getElementById('fBodyError');
      if (ta) ta.classList.remove('json-invalid');
      if (errEl) errEl.style.display = 'none';
    }

    function saveMockRule() {
      if (modifyRequestId) {
        vscode.postMessage({
          command: 'modifyResponse',
          data: {
            requestId: modifyRequestId,
            statusCode: parseInt(document.getElementById('fStatusCode').value, 10),
            headers: tryParse(document.getElementById('fHeaders').value) || {},
            body: tryParse(document.getElementById('fBody').value),
          },
        });
        const entry = entries.find(e => e.id === modifyRequestId);
        if (entry) entry.breakpoint = false;
        closeMockEditor();
        render();
        return;
      }

      const rule = {
        id: editingRuleId || 'rule_' + Date.now(),
        urlPattern: document.getElementById('fUrlPattern').value,
        method: document.getElementById('fMethod').value || null,
        enabled: true,
        action: document.getElementById('fAction').value,
        mockResponse: {
          statusCode: parseInt(document.getElementById('fStatusCode').value, 10),
          headers: tryParse(document.getElementById('fHeaders').value) || {"content-type":"application/json"},
          body: tryParse(document.getElementById('fBody').value),
          delayMs: parseInt(document.getElementById('fDelay').value) || 0,
        },
      };

      if (editingRuleId) {
        const idx = mockRules.findIndex(r => r.id === editingRuleId);
        if (idx !== -1) mockRules[idx] = rule;
        vscode.postMessage({ command: 'addMockRule', data: rule });
      } else {
        mockRules.push(rule);
        vscode.postMessage({ command: 'addMockRule', data: rule });
      }

      vscode.postMessage({ command: 'persistRules', data: { rules: mockRules } });
      closeMockEditor();
      render();
    }

    function deleteMockRule(ruleId) {
      mockRules = mockRules.filter(r => r.id !== ruleId);
      vscode.postMessage({ command: 'removeMockRule', data: { ruleId } });
      vscode.postMessage({ command: 'persistRules', data: { rules: mockRules } });
      render();
    }

    // ---- Actions ----
    function resumeBreakpoint() {
      if (!selectedId) return;
      vscode.postMessage({ command: 'resumeResponse', data: { requestId: selectedId } });
      const entry = entries.find(e => e.id === selectedId);
      if (entry) entry.breakpoint = false;
      render();
      renderDetail(entry);
    }

    function replayRequest(id) {
      const targetId = id != null ? id : selectedId;
      if (!targetId) return;
      const entry = entries.find(e => e.id === targetId);
      if (!entry) return;
      vscode.postMessage({
        command: 'replayRequest',
        data: {
          method: entry.method,
          url: entry.url,
          headers: entry.requestHeaders,
          body: entry.requestBody,
        },
      });
    }

    function clearTraffic() {
      entries = [];
      selectedId = null;
      closeDetail();
      render();
      vscode.postMessage({ command: 'clearTraffic' });
    }

    function mockThisEndpoint(id) {
      const entry = entries.find(e => e.id === (id != null ? id : selectedId));
      if (!entry) return;

      // Check if a rule already exists — if so, open it for editing
      const existing = findRuleForEntry(entry);
      if (existing) {
        editMockRule(existing.id);
        return;
      }

      // Pre-fill the mock editor with this request's data
      editingRuleId = null;
      modifyRequestId = null;
      document.getElementById('mockEditorTitle').textContent = 'Mock: ' + entry.method + ' ' + extractPath(entry.url);
      document.getElementById('btnSaveMock').textContent = 'Save & enable mock';
      document.getElementById('fUrlPattern').value = entry.url;
      document.getElementById('fMethod').value = entry.method;
      document.getElementById('fAction').value = 'mockBeforeRequest';
      setStatusCode(entry.statusCode || 200);
      document.getElementById('fDelay').value = 0;
      document.getElementById('fBody').value = tryStringify(entry.responseBody);
      document.getElementById('fHeaders').value = JSON.stringify(
        entry.responseHeaders || {"content-type":"application/json"}
      );
      document.getElementById('mockOverlay').classList.add('open');
      updateMockBodyHighlight();
      validateMockBody();
    }

    function toggleMockRule(ruleId, enabled) {
      const rule = mockRules.find(r => r.id === ruleId);
      if (!rule) return;

      rule.enabled = enabled;

      if (enabled) {
        // Re-add the rule to Flutter
        vscode.postMessage({ command: 'addMockRule', data: rule });
      } else {
        // Remove from Flutter so it stops matching
        vscode.postMessage({ command: 'removeMockRule', data: { ruleId: ruleId } });
      }

      vscode.postMessage({ command: 'persistRules', data: { rules: mockRules } });
      render();

      // Re-render mock status bar if detail panel is open
      if (selectedId) {
        const entry = entries.find(e => e.id === selectedId);
        if (entry) renderMockStatusBar(entry);
      }
    }

    // ---- Tab switching ----
    function switchMainTab(el, tab) {
      currentMainTab = tab;
      document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function applyFilter() {
      filterText = document.getElementById('filterInput').value;
      render();
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (!serverRunning) {
        dot.className = 'status-dot';
        txt.textContent = 'Server stopped';
      } else if (connected) {
        dot.className = 'status-dot on';
        txt.textContent = 'Connected';
      } else {
        dot.className = 'status-dot waiting';
        txt.textContent = 'Waiting...';
      }
    }

    // ---- Helpers ----
    function sec(title) {
      return '<div class="detail-section"><div class="detail-section-title">' + title + '</div></div>';
    }
    function tr(k, v) {
      return '<tr><td>' + esc(k) + '</td><td>' + v + '</td></tr>';
    }
    function headersTable(headers) {
      if (!headers || Object.keys(headers).length === 0) {
        return '<div style="color:var(--fg-muted);padding:8px">No headers</div>';
      }
      let h = '<table class="header-table">';
      for (const [k, v] of Object.entries(headers)) {
        h += tr(k, esc(String(v)));
      }
      return h + '</table>';
    }
    function extractPath(url) {
      try { const u = new URL(url); return u.pathname + u.search; }
      catch { return url; }
    }
    function fmtTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function esc(s) {
      if (typeof s !== 'string') s = String(s ?? '');
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function tryParse(s) {
      if (!s) return null;
      try { return JSON.parse(s); } catch { return s; }
    }
    function tryStringify(v) {
      if (v == null) return '';
      if (typeof v === 'string') return v;
      try { return JSON.stringify(v, null, 2); } catch { return String(v); }
    }

    // ========================================================================
    // EVENT DELEGATION — replaces all inline onclick/oninput handlers
    // ========================================================================

    // Toolbar buttons
    document.getElementById('toolbar').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      if (btn.dataset.action === 'mock') openMockEditor();
    });

    // Filter input
    document.getElementById('filterInput').addEventListener('input', applyFilter);

    // Main tab bar (tabs + clear traffic button)
    document.getElementById('tabBar').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (btn && btn.dataset.action === 'clear') { clearTraffic(); return; }
      var tab = e.target.closest('[data-tab]');
      if (tab) switchMainTab(tab, tab.dataset.tab);
    });

    // Request list (dynamic rows + mock rule buttons + toggles)
    document.getElementById('requestList').addEventListener('click', function(e) {
      // Toggle switches (must check before data-id since toggle is inside card)
      var toggle = e.target.closest('[data-toggle-rule]');
      if (toggle) {
        e.stopPropagation();
        return toggleMockRule(toggle.dataset.toggleRule, toggle.checked);
      }

      // Three-dot row menu button
      var menuBtn = e.target.closest('[data-row-menu]');
      if (menuBtn) {
        e.stopPropagation();
        return showRowMenu(menuBtn.dataset.rowMenu, menuBtn);
      }

      var row = e.target.closest('[data-id]');
      if (row) return selectEntry(row.dataset.id);

      var editBtn = e.target.closest('[data-edit-rule]');
      if (editBtn) return editMockRule(editBtn.dataset.editRule);

      var delBtn = e.target.closest('[data-del-rule]');
      if (delBtn) return deleteMockRule(delBtn.dataset.delRule);
    });

    // Detail header buttons
    document.getElementById('detailHeader').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      if (action === 'replay') replayRequest();
      if (action === 'resume') resumeBreakpoint();
      if (action === 'mock-this') mockThisEndpoint();
      if (action === 'close-detail') closeDetail();
    });

    // Mock status bar (toggle + edit inside detail panel)
    document.getElementById('mockStatusBar').addEventListener('click', function(e) {
      var toggle = e.target.closest('[data-toggle-rule]');
      if (toggle) {
        return toggleMockRule(toggle.dataset.toggleRule, toggle.checked);
      }
      var editBtn = e.target.closest('[data-action="edit-active-rule"]');
      if (editBtn) {
        return editMockRule(editBtn.dataset.ruleId);
      }
    });

    // Detail tabs
    document.getElementById('detailTabs').addEventListener('click', function(e) {
      var tab = e.target.closest('[data-dtab]');
      if (tab) switchDetailTab(tab, tab.dataset.dtab);
    });

    // Mock overlay (action buttons)
    document.getElementById('mockOverlay').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      if (action === 'save-mock') saveMockRule();
      if (action === 'cancel-modal') closeMockEditor();
      if (action === 'close-modal') closeMockEditor();
    });

    // Mock editor JSON body highlighting + validation
    document.getElementById('fBody').addEventListener('input', () => {
      updateMockBodyHighlight();
      validateMockBody();
    });
    document.getElementById('fBody').addEventListener('scroll', syncMockBodyScroll);
    document.getElementById('btnFormatBody').addEventListener('click', prettyFormatBody);

    // ---- Row context menu ----
    function showRowMenu(entryId, btn) {
      rowMenuEntryId = entryId;
      const menu = document.getElementById('rowContextMenu');
      const entry = entries.find(e => e.id === entryId);
      const hasResponse = entry && (entry.statusCode != null || entry.error);
      menu.querySelector('[data-ctx="replay"]').style.display = hasResponse ? '' : 'none';
      const rect = btn.getBoundingClientRect();
      const menuH = menu.offsetHeight || 72;
      const top = rect.bottom + menuH > window.innerHeight ? rect.top - menuH - 2 : rect.bottom + 2;
      const left = Math.max(4, rect.right - 144);
      menu.style.top = top + 'px';
      menu.style.left = left + 'px';
      menu.classList.add('open');
    }

    function hideRowMenu() {
      document.getElementById('rowContextMenu').classList.remove('open');
      rowMenuEntryId = null;
    }

    document.getElementById('rowContextMenu').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-ctx]');
      if (!btn || !rowMenuEntryId) return;
      var id = rowMenuEntryId;
      hideRowMenu();
      if (btn.dataset.ctx === 'mock-this') mockThisEndpoint(id);
      if (btn.dataset.ctx === 'replay') replayRequest(id);
    });

    document.addEventListener('click', function(e) {
      if (!document.getElementById('rowContextMenu').classList.contains('open')) return;
      if (!e.target.closest('#rowContextMenu') && !e.target.closest('[data-row-menu]')) {
        hideRowMenu();
      }
    });

    // Init
    vscode.postMessage({ command: 'getEntries' });
  </script>
</body>
</html>
