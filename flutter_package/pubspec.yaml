name: flutter_net_inspector
description: >
  Flipper/Stetho-like network inspector for Flutter. Dio interceptor
  with real-time mocking, breakpoints, and a VSCode extension dashboard.
version: 0.0.1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  dio: ^5.9.1

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
